<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Piano di Miglioramento Team</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell" id="appShell" aria-label="Piano di miglioramento personale">
      <button
        id="toggleLeftSidebar"
        class="sidebar-toggle sidebar-toggle-left"
        type="button"
        aria-label="Nascondi menu membro"
        title="Nascondi menu membro"
      >
        <span aria-hidden="true">&lt;</span>
      </button>
      <button
        id="toggleRightSidebar"
        class="sidebar-toggle sidebar-toggle-right"
        type="button"
        aria-label="Nascondi toolbox"
        title="Nascondi toolbox"
      >
        <span aria-hidden="true">&gt;</span>
      </button>

      <aside class="sidebar sidebar-left" aria-label="Membro del team">
        <section class="panel member-panel">
          <div class="panel-header">
            <h2>Membro corrente</h2>
            <span id="memberCount" class="counter">0</span>
          </div>

          <div class="member-profile" aria-live="polite">
            <div class="avatar" id="memberAvatar">--</div>
            <div>
              <p id="activeMemberName" class="member-name">Nessun membro</p>
              <p id="activeMemberRole" class="member-role">Profilo non selezionato</p>
            </div>
          </div>

          <label class="field-label" for="memberSelect">Seleziona</label>
          <select id="memberSelect" class="field"></select>
        </section>

        <section class="panel add-member-panel">
          <div class="panel-header">
            <h2>Membri</h2>
          </div>
          <div id="memberList" class="member-list" aria-label="Membri esistenti"></div>
          <div class="split-fields">
            <label>
              <span class="field-label">Nome</span>
              <input id="memberName" class="field" type="text" placeholder="Nuovo membro" />
            </label>
            <label>
              <span class="field-label">Ruolo</span>
              <input id="memberRole" class="field" type="text" placeholder="Ruolo" />
            </label>
          </div>

          <button id="saveMember" class="primary-action" type="button">
            <span class="button-icon" aria-hidden="true">+</span>
            Salva membro
          </button>
        </section>

      </aside>

      <section class="workspace" aria-label="Visualizzazione del piano">
        <header class="workspace-header">
          <div>
            <p class="eyebrow">Roadmap individuale</p>
            <div class="workspace-title-row">
              <button id="goCurrentWeek" class="scale-button current-week-button" type="button">Week corrente</button>
            </div>
          </div>
          <div class="timeline-controls" aria-label="Navigazione temporale">
            <span id="timelineYear" class="timeline-year">Anno</span>
            <span id="saveStatus" class="save-status" aria-live="polite">Salvataggio locale</span>
          </div>
        </header>

        <div class="timeline-frame" id="timelineFrame" data-testid="timeline-frame">
          <div id="timeAxis" class="time-axis" aria-hidden="true"></div>
          <div id="planGrid" class="plan-grid"></div>
        </div>
      </section>

      <aside class="sidebar sidebar-right" aria-label="Tool">
        <div class="panel-header standalone">
          <div>
            <p class="eyebrow">Toolbox</p>
            <h2>Tool</h2>
          </div>
        </div>

        <div class="tool-list" id="toolList">
          <button class="tool-item tool-draggable active" type="button" draggable="true" data-tool="line" data-testid="tool-line">
            <span class="tool-icon line-tool" aria-hidden="true"></span>
            <span>
              <strong>Linea obiettivo</strong>
              <small>Elemento griglia</small>
            </span>
          </button>
          <button class="tool-item tool-draggable" type="button" draggable="true" data-tool="criterion" data-testid="tool-criterion">
            <span class="tool-icon circle-tool" aria-hidden="true"></span>
            <span>
              <strong>Cerchio criterio</strong>
              <small>Milestone</small>
            </span>
          </button>
        </div>
      </aside>
    </main>

    <div id="goalPopup" class="goal-popup" hidden>
      <section class="panel compact goal-popup-panel" role="dialog" aria-modal="true" aria-labelledby="goalPopupTitle">
        <div class="panel-header">
          <h2 id="goalPopupTitle">Criterio selezionato</h2>
          <div class="popup-actions">
            <button id="closeGoalPopup" class="icon-button" type="button" aria-label="Chiudi obiettivi" title="Chiudi obiettivi">
              x
            </button>
          </div>
        </div>
        <div id="goalList" class="goal-list"></div>
      </section>
    </div>

    <div id="confirmDialog" class="confirm-dialog" hidden>
      <section class="panel confirm-panel" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
        <h2 id="confirmTitle">Conferma eliminazione</h2>
        <p id="confirmMessage">Vuoi eliminare questo elemento?</p>
        <div class="confirm-actions">
          <button id="cancelConfirm" class="secondary-action" type="button">Annulla</button>
          <button id="confirmDelete" class="danger-action" type="button">Elimina</button>
        </div>
      </section>
    </div>

    <template id="goalTemplate">
      <article class="goal-editor">
        <div class="criteria-block">
          <div class="criteria-list"></div>
        </div>
      </article>
    </template>

    <template id="criterionTemplate">
      <div class="criterion-editor">
        <input class="criterion-label-input" type="text" aria-label="Criterio di avanzamento" placeholder="Criterio" />
        <select class="criterion-status-input" aria-label="Stato criterio">
          <option value="locked">Bloccato</option>
          <option value="unlocked">Sbloccato</option>
        </select>
        <button class="remove-criterion" type="button" aria-label="Rimuovi criterio" title="Rimuovi criterio">x</button>
      </div>
    </template>

    <script src="supabase-config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
